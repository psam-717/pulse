<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Healthcare API — Documentation</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏥</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }
    .topbar {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #3b82f6;
    }
    .topbar h1 { font-size: 20px; font-weight: 600; }
    .topbar .subtitle { color: #94a3b8; font-size: 13px; margin-left: auto; }
    .topbar .badge {
      background: #3b82f6;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 12px;
      letter-spacing: 0.5px;
    }
    #swagger-ui { max-width: 1400px; margin: 0 auto; padding: 0 16px; }
    .info-footer {
      text-align: center;
      padding: 32px 16px;
      color: #64748b;
      font-size: 13px;
      border-top: 1px solid #e2e8f0;
      margin-top: 32px;
    }
    .info-footer a { color: #3b82f6; text-decoration: none; }
    .info-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="badge">v2.0.0</span>
    <h1>Pulse Healthcare API</h1>
    <span class="subtitle">Ghana Hospital Booking Platform</span>
  </div>
  <div id="swagger-ui"></div>
  <div class="info-footer">
    <p>
      <a href="https://github.com/psam-717/pulse" target="_blank">psam-717/pulse</a>
      &nbsp;·&nbsp; MIT License
      &nbsp;·&nbsp; Built with Spring Boot 4.0.4 + Java 25
    </p>
  </div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: "openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      layout: "BaseLayout",
      tryItOutEnabled: true,
      displayRequestDuration: true,
      filter: true,
      showExtensions: true,
      showCommonExtensions: true,
      defaultModelExpandDepth: 3,
      docExpansion: "list"
    });
  </script>
</body>
</html>
